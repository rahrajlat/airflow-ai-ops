spark:
  - error: "FetchFailedException: Failed to fetch shuffle blocks"
    root_cause: "Shuffle fetch failed due to executor or network issue"
    decision: "RERUN"
    source: "human"

  - error: "ExecutorLostFailure: Executor exited unexpectedly"
    root_cause: "Executor crashed or node lost"
    decision: "RERUN"
    source: "human"

  - error: "OutOfMemoryError: Java heap space"
    root_cause: "Insufficient executor memory"
    decision: "NO_RERUN"
    source: "human"

  - error: "Task not serializable"
    root_cause: "Non-serializable object in closure"
    decision: "NO_RERUN"
    source: "human"

  - error: "GC overhead limit exceeded"
    root_cause: "Excessive garbage collection due to memory pressure"
    decision: "NO_RERUN"
    source: "human"

  - error: "Connection reset by peer during shuffle"
    root_cause: "Transient network issue"
    decision: "RERUN"
    source: "human"

  - error: "Timeout waiting for executor heartbeat"
    root_cause: "Executor lost connectivity"
    decision: "RERUN"
    source: "human"

  - error: "FileNotFoundException: Path does not exist"
    root_cause: "Missing input data"
    decision: "NO_RERUN"
    source: "human"

  - error: "Stage cancelled due to fetch failure"
    root_cause: "Shuffle fetch failure"
    decision: "RERUN"
    source: "human"

  - error: "Disk spilled data exceeds limit"
    root_cause: "Insufficient disk"
    decision: "NO_RERUN"
    source: "human"


